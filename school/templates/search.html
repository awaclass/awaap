{% load humanize %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KishiFace - Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* CSS Variables for easy color management */
        :root {
            --primary-blue: #3897f0;
            --text-gray-900: #1f2937;
            --text-gray-800: #374151;
            --text-gray-500: #6b7280;
            --text-gray-400: #9ca3af;
            --border-gray-200: #e5e7eb;
            --bg-gray-50: #f9fafb;
        }

        /* Base Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            /* Space for the fixed search bar (h-14 is 56px, plus a little extra) */
            padding-top: 60px;
            margin: 0;
        }

        /* --- Header Styling (fixed top-0 left-0 right-0 h-14 bg-white border-b border-gray-200 flex items-center px-4 z-20 shadow-sm) --- */
        .search-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px; /* h-14 */
            background-color: white;
            border-bottom: 1px solid var(--border-gray-200);
            display: flex;
            align-items: center;
            padding-left: 1rem; /* px-4 */
            padding-right: 1rem; /* px-4 */
            z-index: 20;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); /* shadow-sm */
        }

        /* Search Form Styling (w-full flex items-center) */
        .search-form {
            width: 100%;
            display: flex;
            align-items: center;
        }

        /* Search Icon */
        .search-form .fa-search {
            color: var(--text-gray-400);
            margin-right: 0.5rem; /* mr-2 */
        }

        /* Search Input (flex-grow p-1.5 text-base bg-transparent focus:outline-none placeholder-gray-500) */
        .search-form input[type="text"] {
            flex-grow: 1; /* flex-grow */
            padding: 0.375rem 0.5rem; /* p-1.5 */
            font-size: 1rem; /* text-base */
            background-color: transparent;
            border: none;
            outline: none; /* focus:outline-none */
            color: var(--text-gray-800);
            /* Placeholder color equivalent */
            
        }
        .search-form input[type="text"]::placeholder {
            color: var(--text-gray-500);
        }

        /* Clear Button */
        .search-form .clear-button {
            color: var(--text-gray-400);
            cursor: pointer;
            padding: 0.25rem;
            transition: color 150ms ease-in-out; /* transition duration-150 */
            background: none;
            border: none;
        }
        .search-form .clear-button:hover {
            color: var(--text-gray-600); /* hover:text-gray-600 */
        }

        /* --- Main Content Container (max-w-xl mx-auto w-full p-4) --- */
        .main-content {
            max-width: 640px; /* max-w-xl */
            margin-left: auto; /* mx-auto */
            margin-right: auto; /* mx-auto */
            width: 100%;
            padding: 1rem; /* p-4 */
        }

        /* --- User Result Item (flex items-center py-3 px-2 hover:bg-gray-50 rounded-lg transition duration-150 cursor-pointer) --- */
        .user-result-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 0.5rem; /* py-3 px-2 */
            margin-bottom: 0.5rem;
            text-decoration: none;
            color: inherit;
            border-radius: 0.5rem; /* rounded-lg */
            transition: background-color 150ms ease-in-out; /* transition duration-150 */
            cursor: pointer;
        }

        .user-result-item:hover {
            background-color: var(--bg-gray-50); /* hover:bg-gray-50 */
        }

        /* Profile Picture (h-12 w-12 rounded-full object-cover border border-gray-200 mr-3) */
        .profile-pic {
            height: 3rem; /* h-12 (48px) */
            width: 3rem; /* w-12 (48px) */
            border-radius: 50%; /* rounded-full */
            object-fit: cover;
            border: 1px solid var(--border-gray-200);
            margin-right: 0.75rem; /* mr-3 */
            flex-shrink: 0;
        }

        /* Username (font-semibold text-gray-800) */
        .username {
            font-weight: 600; /* font-semibold */
            color: var(--text-gray-800);
        }

        /* Full Name (text-sm text-gray-500) */
        .full-name {
            font-size: 0.875rem; /* text-sm */
            color: var(--text-gray-500);
        }

        /* View Button/Placeholder (ml-auto text-sm text-primary-blue font-semibold) */
        .view-action {
            margin-left: auto; /* ml-auto */
            font-size: 0.875rem; /* text-sm */
            color: var(--primary-blue);
            font-weight: 600; /* font-semibold */
        }
        
        /* No Results Message (text-center p-12 text-gray-500) */
        .no-results-message {
            text-align: center;
            padding: 3rem; /* p-12 */
            color: var(--text-gray-500);
        }
        .no-results-message h3 {
            font-size: 1.125rem; /* text-lg */
            font-weight: 600; /* font-semibold */
            margin-bottom: 0.5rem; /* mb-2 */
            color: var(--text-gray-800); /* Make heading stand out a bit */
        }
        .no-results-message p {
            margin-top: 0.5rem; /* mt-2 */
            font-size: 0.875rem; /* text-sm */
        }

        /* --- Video Grid Layout (The YouTube Look) --- */
        .videos-grid {
            display: grid;
            /* Responsive Grid: Creates columns that automatically adjust */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px; /* Spacing between video cards */
        }

        /* --- Individual Video Card Styling --- */
        .video-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Optional: Add a subtle hover effect like YouTube */
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: translateY(-2px); /* Lifts the card slightly on hover */
        }

        /* Styling the video element itself as a 'thumbnail' */
        .video-card video {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9; /* Ensure all video previews have a consistent aspect ratio */
            object-fit: cover;
            border-radius: 8px; /* Slightly rounded corners for the video preview */
            margin-bottom: 8px;
        }

        /* --- Video Details (Under the preview) --- */
        .video-details {
            display: flex;
            align-items: flex-start;
            padding-right: 24px; /* Space for a potential menu button if needed */
        }

        .channel-picture {
            flex-shrink: 0; /* Prevents the image from shrinking */
            margin-right: 12px;
        }

        .channel-picture img {
            border-radius: 50%;
            height: 36px;
            width: 36px;
            object-fit: cover;
        }

        .metadata {
            display: flex;
            flex-direction: column;
            min-width: 0; /* Allows text to wrap */
        }

        .video-title {
            font-size: 1rem; /* 16px */
            font-weight: 500;
            line-height: 1.4;
            max-height: 2.8em; /* Limit to 2 lines for title */
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            margin: 0 0 4px 0;
        }

        .channel-name {
            font-size: 0.85rem;
            color: #606060; /* Gray for secondary text */
            margin-bottom: 2px;
        }

        .video-stats {
            font-size: 0.85rem;
            color: #606060;
        }

        /* Hide 'about' text in the grid view (YouTube style) */
        .video-card .video-about {
            display: none;
        } 

    </style>
</head>
<body>

    <header class="search-header">
        <form action="{% url 'search' %}" class="search-form">
            <i class="fa-solid fa-search"></i>
            <input type="text" name="q" id="q" 
                   placeholder="Search" 
                   required
                   value="{{quary}}"
            >
            <button type="button" onclick="document.getElementById('q').value=''; document.getElementById('q').focus();" 
                    class="clear-button">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <button type="submit" style="display: none;"></button> </form>
    </header>

    <main class="main-content">
        
        <div class="videos-grid">
    {% for video in videos %}
       
            <div class="video-card">
                 <a href="{% url 'post_detail' video.post_id %}" style="text-decoration: none; text-decoration: #606060;">
            <video controls>
                <source src="{{video.video.url}}" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <div class="video-details">
                <div class="channel-picture">
                    <img src="{{video.author.profile.picture.url}}" alt="{{video.author}}'s Profile" onerror="this.onerror=null; this.src='https://via.placeholder.com/36';">
                </div>

                <div class="metadata">
                    <p class="video-title">{{video.title}}</p>
                    <p class="channel-name">{{video.author}} &bull; {{video.like.count|intcomma}} likes &bull; {{video.view|intcomma}} Views &bull; {{video.created_at | naturaltime}}
                    </p></p>
                    <p class="video-stats">
                       
                    
                </div></a>
            </div>
        
        </div>
    {% empty %}
    </div>
    <h2>No videos posted yet. Be the first!</h2>
    {% endfor %}
    </div> <br><br>
</div>
    </main>
{% include 'footer.html' %}
</body>
</html>
