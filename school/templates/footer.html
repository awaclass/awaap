{% load static %}
{% load pwa %}
<html lang="en">  
<head>  
  <meta charset="utf-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1" />  
  {% progressive_web_app_meta %}
  <script src="{% static 'js/pwa-install.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <style>  
    :root {
      --ac-white: #ffffff;
      --ac-border: #e5e7eb;
      --ac-text-light: #6b7280;
      --ac-primary: #f97316;
      --ac-primary-dk: #ea580c;
      --ac-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --nav-bg: rgba(255, 255, 255, 0.97);
      --nav-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.06);
      --nav-icon-color: #6b7280;
      --nav-icon-active: #f97316;
      --badge-color: #f97316;
      --nav-border: #e5e7eb;
    }

    body { 
      font-family: var(--ac-font); 
      margin: 0; 
      padding-bottom: 70px;
    }  
    
    /* === FLOATING PILL NAVIGATION === */
    .bottom-nav { 
      position: fixed; 
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: 92%; 
      max-width: 420px; 
      height: 65px; 
      
      background: var(--nav-bg); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      
      border-radius: 35px; 
      box-shadow: var(--nav-shadow); 
      border: 1px solid var(--nav-border);
      
      display: flex; 
      align-items: center; 
      justify-content: space-evenly;
      padding: 0 5px;
      z-index: 1000; 
    }
    
    /* === NAV ITEMS (all icons including center) === */
    .nav-item { 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      width: 58px;
      height: 54px;
      color: var(--nav-icon-color); 
      font-size: 20px; 
      text-decoration: none;
      position: relative;
      transition: color 0.2s, transform 0.1s;
      border-radius: 16px;
    }
    
    .nav-item .nav-label {
      font-size: 9px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.02em;
      color: inherit;
    }

    .nav-item.active { 
      color: var(--nav-icon-active); 
    }
    
    .nav-item:active {
      transform: scale(0.9);
    }

    /* Hide bottom nav on desktop */
    @media (min-width: 768px) {
      .bottom-nav { display: none !important; }
    }

    /* === BADGES === */
    .nav-badge-count {
      position: absolute;
      top: 2px;
      right: 4px;
      background: var(--badge-color);
      color: white;
      font-size: 9px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffffff;
      pointer-events: none;
    }
    
    .hidden-badge { display: none !important; }

    @media (max-width: 360px) {
      .bottom-nav { width: 96%; height: 60px; }
      .nav-item { font-size: 18px; width: 50px; }
      .nav-item .nav-label { font-size: 8px; }
    }
  </style>  
</head>  
<body>  

<!-- Navigation Bar -->
<nav class="bottom-nav" id="bottomNav">
    
    <!-- 1. Home -->
    <a href="{% url 'home' %}" 
       class="nav-item {% if request.path == '/' or 'home' in request.path %}active{% endif %}" 
       title="Home">
        <i class="fas fa-home"></i>
        <span class="nav-label">Home</span>
    </a>
    
    <!-- 2. Search -->
    <a href="{% url 'search' %}" 
       class="nav-item {% if '/search' in request.path %}active{% endif %}" 
       title="Search">
        <i class="fas fa-search"></i>
        <span class="nav-label">Search</span>
    </a>
    
    <!-- 3. Live Class (Center) -->
    <a href="{% url 'live_room_list' %}" 
       class="nav-item {% if '/live' in request.path %}active{% endif %}" 
       title="Live Class">
        <i class="fas fa-video"></i>
        <span class="nav-label">Live</span>
    </a>
    
    <!-- 4. CBT Exam -->
    <a href="{% url 'cbt_subjects' %}" 
       class="nav-item {% if '/cbt' in request.path %}active{% endif %}" 
       title="CBT Exam">
        <i class="fas fa-file-alt"></i>
        <span class="nav-label">CBT</span>
    </a>
    
    <!-- 5. Discussion Room -->
    <a href="{% url 'chat_room' %}" 
       class="nav-item {% if '/chat' in request.path %}active{% endif %}" 
       title="Discussion Room">
        <i class="fas fa-comments"></i>
        <span class="nav-label">Discuss</span>
    </a>

</nav>  

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Tap animation only - no scroll hide/show
    var navItems = document.querySelectorAll('.nav-item');
    
    navItems.forEach(function(item) {
      item.addEventListener('click', function(e) {
        // Allow the click to go through, just add a small visual feedback
        this.style.transform = 'scale(0.95)';
        setTimeout(() => {
          this.style.transform = '';
        }, 150);
      });
    });
  });
</script>

</body>  
</html>
