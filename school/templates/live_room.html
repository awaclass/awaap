{% load static %}
{% include 'header.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <title>Live Class: {{ session.title }} | awaClass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      overflow: hidden;
    }

    .live-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0f0f0f;
      position: relative;
    }

    /* ─── HOST STAGE (big video) ─────────────────────────────── */
    .host-stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    #host-video-element {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder when host cam is off */
    .host-avatar-placeholder {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      color: #888;
      font-size: 14px;
    }

    .host-avatar-placeholder .avatar-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #f97316;
    }

    /* Host name badge on the big video */
    .host-name-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .host-live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f97316;
      animation: pulse-dot 1.5s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    /* ─── STUDENT BUBBLES TRAY ───────────────────────────────── */
    .student-tray {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      scrollbar-width: none;
    }

    .student-tray::-webkit-scrollbar { display: none; }

    .student-bubble {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 2.5px solid rgba(255,255,255,0.2);
      background: #2d2d2d;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .student-bubble:hover {
      transform: scale(1.08);
      border-color: #f97316;
    }

    .student-bubble video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Student avatar fallback */
    .student-bubble .bubble-avatar {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2d2d2d;
      color: #888;
      font-size: 28px;
    }

    /* Name tooltip below bubble */
    .student-bubble .bubble-name {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 6px;
      pointer-events: none;
    }

    .student-bubble-wrapper {
      position: relative;
      margin-bottom: 20px; /* space for the name label */
    }

    /* Muted indicator on bubble */
    .bubble-muted-icon {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: white;
      display: none;
    }

    /* ─── ROOM INFO ─────────────────────────────────────────── */
    .room-info {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    .live-badge {
      background: #ef4444;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 6px;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      animation: pulse-dot 1.4s infinite;
    }

    /* Viewer counter */
    .viewer-counter {
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(10px);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .viewer-counter i {
      color: #f97316;
      font-size: 13px;
    }

    .viewer-counter .vc-count {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      min-width: 16px;
      text-align: center;
      transition: all 0.3s;
    }

    .viewer-counter .vc-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
    }

    @keyframes count-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); color: #f97316; }
      100% { transform: scale(1); }
    }

    .vc-count.popping {
      animation: count-pop 0.35s ease-out;
    }

    /* Session title pill */
    .session-title-pill {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.85);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ─── CONTROLS BAR ──────────────────────────────────────── */
    .controls-bar {
      background: #1c1c1c;
      padding: 14px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #2a2a2a;
      flex-wrap: wrap;
      z-index: 10;
    }

    .control-btn {
      background: #2d2d2d;
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .control-btn:hover {
      background: #3a3a3a;
      transform: scale(1.07);
    }

    .control-btn.active {
      background: #f97316;
    }

    .control-btn.danger {
      background: #ef4444;
    }

    .control-btn.danger:hover {
      background: #dc2626;
    }

    /* Camera flip — only shown to host */
    #flip-camera {
      display: none; /* shown via JS if isHost */
    }

    .leave-btn {
      background: #ef4444;
      width: auto;
      padding: 0 22px;
      border-radius: 24px;
      font-size: 14px;
      gap: 6px;
    }

    .leave-btn:hover {
      background: #dc2626;
    }

    .btn-label {
      font-size: 11px;
      margin-top: 1px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .control-group span {
      font-size: 10px;
      color: #888;
    }

    /* ─── CHAT SIDEBAR ──────────────────────────────────────── */
    .chat-sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: #1e1e1e;
      transform: translateX(100%);
      transition: transform 0.3s;
      z-index: 30;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #2d2d2d;
    }

    .chat-sidebar.open {
      transform: translateX(0);
    }

    .chat-header {
      padding: 16px;
      background: #f97316;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-message {
      padding: 8px 12px;
      background: #2d2d2d;
      border-radius: 10px;
      font-size: 13px;
      color: #e5e5e5;
      line-height: 1.4;
    }

    .chat-message strong {
      color: #f97316;
    }

    .chat-input {
      padding: 14px;
      border-top: 1px solid #2d2d2d;
      display: flex;
      gap: 8px;
    }

    .chat-input input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      background: #2d2d2d;
      color: white;
      font-size: 13px;
      outline: none;
    }

    .chat-input input:focus {
      border-color: #f97316;
    }

    .chat-input button {
      padding: 8px 14px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .toggle-chat {
      position: fixed;
      bottom: 82px;
      right: 20px;
      background: #f97316;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 14px rgba(249,115,22,0.4);
    }

    .toggle-chat i { color: white; font-size: 18px; }

    .toggle-chat.hidden { display: none; }

    .chat-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 29;
    }

    .chat-overlay.active { display: block; }

    /* .student-count-badge folded into .viewer-counter inside .room-info */

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .student-bubble { width: 64px; height: 64px; }
      .student-tray { top: 12px; right: 10px; gap: 8px; }
      .controls-bar { padding: 10px 14px; gap: 8px; }
      .control-btn { width: 42px; height: 42px; font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="live-container">

  <!-- ── HOST STAGE ── -->
  <div class="host-stage" id="host-stage">

    <!-- The big host video -->
    <video id="host-video-element" autoplay playsinline muted></video>

    <!-- Shown when host cam is off -->
    <div class="host-avatar-placeholder" id="host-placeholder">
      <div class="avatar-circle"><i class="fa-solid fa-user"></i></div>
      <span id="host-placeholder-name">Host</span>
    </div>

    <!-- Room info top-left: LIVE dot + viewer count + session title -->
    <div class="room-info">
      <span class="live-badge">
        <span class="live-badge-dot"></span>
        LIVE
      </span>
      <div class="viewer-counter">
        <i class="fa-solid fa-eye"></i>
        <span class="vc-count" id="participant-count">1</span>
        <span class="vc-label">watching</span>
      </div>
      <span class="session-title-pill">
        <i class="fa-solid fa-chalkboard-teacher" style="margin-right:4px;opacity:0.7;font-size:11px;"></i>{{ session.title }}
      </span>
    </div>

    <!-- Host name badge bottom-left -->
    <div class="host-name-badge" id="host-name-badge">
      <div class="host-live-dot"></div>
      <span id="host-display-name">{{ user.username }}</span>
      <small style="opacity:0.6;">(Host)</small>
    </div>

    <!-- Student bubbles tray top-right -->
    <div class="student-tray" id="student-tray">
      <!-- Student bubble wrappers injected here by JS -->
    </div>

  </div><!-- /host-stage -->

  <!-- ── CONTROLS BAR ── -->
  <div class="controls-bar">

    <div class="control-group">
      <button class="control-btn" id="toggle-video" title="Toggle Camera">
        <i class="fa-solid fa-video"></i>
      </button>
      <span>Camera</span>
    </div>

    <div class="control-group">
      <button class="control-btn" id="toggle-audio" title="Toggle Mic">
        <i class="fa-solid fa-microphone"></i>
      </button>
      <span>Mic</span>
    </div>

    <!-- Camera flip — mobile only, host only -->
    <div class="control-group" id="flip-camera-group" style="display:none;">
      <button class="control-btn" id="flip-camera" title="Flip Camera">
        <i class="fa-solid fa-rotate"></i>
      </button>
      <span>Flip</span>
    </div>

    <div class="control-group">
      <button class="control-btn" id="toggle-screen" title="Share Screen">
        <i class="fa-solid fa-desktop"></i>
      </button>
      <span>Screen</span>
    </div>

    <div class="control-group">
      <button class="control-btn leave-btn" id="leave-room">
        <i class="fa-solid fa-phone-slash"></i> Leave
      </button>
    </div>

  </div>

  <!-- ── CHAT OVERLAY + TOGGLE ── -->
  <div class="chat-overlay" id="chat-overlay"></div>
  <div class="toggle-chat" id="toggle-chat">
    <i class="fa-regular fa-comment-dots"></i>
  </div>

  <!-- ── CHAT SIDEBAR ── -->
  <div class="chat-sidebar" id="chat-sidebar">
    <div class="chat-header">
      <span><i class="fa-regular fa-comment-dots"></i> Live Chat</span>
      <i class="fa-solid fa-xmark" id="close-chat" style="cursor:pointer;"></i>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-message">
        <strong>System:</strong> You joined the live session
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="chat-input" placeholder="Type a message…">
      <button id="send-chat">Send</button>
    </div>
  </div>

</div><!-- /live-container -->

<script>
  const roomName   = '{{ room_name }}';
  const userName   = '{{ user.username }}';
  const userId     = {{ user.id }};
  const isHost     = {{ is_creator|yesno:"true,false" }};

  let localStream;
  let peerConnections = {};
  let socket;
  let isVideoEnabled   = true;
  let isAudioEnabled   = true;
  let isScreenSharing  = false;
  let screenStream;
  let currentFacingMode = 'user'; // 'user' = front, 'environment' = back

  const configuration = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
    ]
  };

  // ─────────────────────────────────────────────────────
  // LAYOUT HELPERS
  // ─────────────────────────────────────────────────────

  /**
   * Attach a stream to the big host stage video element.
   */
  function setHostVideo(stream) {
    const v = document.getElementById('host-video-element');
    const ph = document.getElementById('host-placeholder');
    v.srcObject = stream;
    v.style.display = 'block';
    ph.style.display = 'none';
  }

  /**
   * Show host avatar placeholder (cam off).
   */
  function showHostPlaceholder(name) {
    const v  = document.getElementById('host-video-element');
    const ph = document.getElementById('host-placeholder');
    v.style.display = 'none';
    ph.style.display = 'flex';
    document.getElementById('host-placeholder-name').textContent = name || 'Host';
  }

  /**
   * Add a circular student bubble for a remote participant.
   * (Only called for non-host participants from the host's perspective,
   *  or for the host when the current user is a student.)
   */
  function addStudentBubble(username, uid) {
    if (document.getElementById(`bubble-wrapper-${uid}`)) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'student-bubble-wrapper';
    wrapper.id = `bubble-wrapper-${uid}`;

    const bubble = document.createElement('div');
    bubble.className = 'student-bubble';
    bubble.id = `video-${uid}`;
    bubble.title = username;

    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.id = `video-element-${uid}`;
    video.style.borderRadius = '50%';

    // Avatar fallback
    const avatar = document.createElement('div');
    avatar.className = 'bubble-avatar';
    avatar.innerHTML = '<i class="fa-solid fa-user"></i>';
    avatar.id = `bubble-avatar-${uid}`;

    // Muted indicator
    const mutedIcon = document.createElement('div');
    mutedIcon.className = 'bubble-muted-icon';
    mutedIcon.id = `bubble-muted-${uid}`;
    mutedIcon.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';

    // Name label
    const nameLabel = document.createElement('div');
    nameLabel.className = 'bubble-name';
    nameLabel.textContent = username;

    bubble.appendChild(video);
    bubble.appendChild(avatar);
    bubble.appendChild(mutedIcon);
    wrapper.appendChild(bubble);
    wrapper.appendChild(nameLabel);

    document.getElementById('student-tray').appendChild(wrapper);
  }

  function removeStudentBubble(uid) {
    const wrapper = document.getElementById(`bubble-wrapper-${uid}`);
    if (wrapper) wrapper.remove();
    if (peerConnections[uid]) {
      peerConnections[uid].close();
      delete peerConnections[uid];
    }
  }

  // ─────────────────────────────────────────────────────
  // WEBSOCKET
  // ─────────────────────────────────────────────────────
  function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    socket = new WebSocket(`${protocol}//${window.location.host}/ws/live/${roomName}/`);

    socket.onopen  = () => console.log('WebSocket connected');
    socket.onmessage = (e) => handleSignalingData(JSON.parse(e.data));
    socket.onerror   = (e) => console.error('WebSocket error:', e);
  }

  function handleSignalingData(data) {
    switch (data.type) {
      case 'user_joined':
        if (data.user_id != userId) {
          addStudentBubble(data.user, data.user_id);
          createOffer(data.user_id);
          addChatMessage('System', `${data.user} joined`);
          updateParticipantCount();
        }
        break;
      case 'user_left':
        removeStudentBubble(data.user_id);
        addChatMessage('System', `${data.user} left`);
        updateParticipantCount();
        break;
      case 'offer':
        if (data.user_id != userId) handleOffer(data);
        break;
      case 'answer':
        if (data.user_id != userId) handleAnswer(data);
        break;
      case 'ice_candidate':
        if (data.user_id != userId) handleIceCandidate(data);
        break;
      case 'video_toggle':
        if (data.user_id != userId) updateRemoteVideoStatus(data.user_id, data.enabled);
        break;
      case 'audio_toggle':
        if (data.user_id != userId) updateRemoteMuteStatus(data.user_id, data.enabled);
        break;
      case 'chat_message':
        addChatMessage(data.user, data.message);
        break;
    }
  }

  // ─────────────────────────────────────────────────────
  // WEBRTC
  // ─────────────────────────────────────────────────────
  async function createOffer(remoteUserId) {
    const pc = new RTCPeerConnection(configuration);
    peerConnections[remoteUserId] = pc;

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.send(JSON.stringify({ type:'ice_candidate', candidate:e.candidate, user_id:remoteUserId }));
    };

    pc.ontrack = (e) => {
      const v = document.getElementById(`video-element-${remoteUserId}`);
      if (v && e.streams[0]) {
        v.srcObject = e.streams[0];
        // Hide avatar placeholder on the bubble
        const av = document.getElementById(`bubble-avatar-${remoteUserId}`);
        if (av) av.style.display = 'none';
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.send(JSON.stringify({ type:'offer', offer, user_id:remoteUserId }));
  }

  async function handleOffer(data) {
    const pc = new RTCPeerConnection(configuration);
    peerConnections[data.user_id] = pc;

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.send(JSON.stringify({ type:'ice_candidate', candidate:e.candidate, user_id:data.user_id }));
    };

    pc.ontrack = (e) => {
      const v = document.getElementById(`video-element-${data.user_id}`);
      if (v && e.streams[0]) {
        v.srcObject = e.streams[0];
        const av = document.getElementById(`bubble-avatar-${data.user_id}`);
        if (av) av.style.display = 'none';
      }
    };

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.send(JSON.stringify({ type:'answer', answer, user_id:data.user_id }));
  }

  async function handleAnswer(data) {
    const pc = peerConnections[data.user_id];
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
  }

  async function handleIceCandidate(data) {
    const pc = peerConnections[data.user_id];
    if (pc && data.candidate) await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
  }

  // ─────────────────────────────────────────────────────
  // LOCAL MEDIA INIT
  // ─────────────────────────────────────────────────────
  async function initLocalStream() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode },
        audio: true
      });

      if (isHost) {
        setHostVideo(localStream);
      } else {
        // Student sees themselves as a bubble; host's video comes via WebRTC
        addStudentBubble(`${userName} (You)`, userId);
        const v = document.getElementById(`video-element-${userId}`);
        if (v) {
          v.srcObject = localStream;
          const av = document.getElementById(`bubble-avatar-${userId}`);
          if (av) av.style.display = 'none';
        }
      }
    } catch (err) {
      console.error('Media error:', err);
      addChatMessage('System', 'Could not access camera/mic. Check permissions.');
    }
  }

  // ─────────────────────────────────────────────────────
  // CAMERA FLIP (front ↔ back)
  // ─────────────────────────────────────────────────────
  async function flipCamera() {
    currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';

    // Stop old video tracks
    localStream.getVideoTracks().forEach(t => t.stop());

    try {
      const newStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode },
        audio: false
      });

      const newVideoTrack = newStream.getVideoTracks()[0];

      // Replace track in all peer connections
      Object.values(peerConnections).forEach(pc => {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(newVideoTrack);
      });

      // Swap track in localStream
      localStream.removeTrack(localStream.getVideoTracks()[0]);
      localStream.addTrack(newVideoTrack);

      // Update host stage video
      if (isHost) setHostVideo(localStream);

      // Animate the flip button
      const btn = document.getElementById('flip-camera');
      btn.style.transform = 'scale(0.8) rotate(180deg)';
      setTimeout(() => btn.style.transform = '', 300);

    } catch (err) {
      console.error('Camera flip failed:', err);
      // Revert
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
    }
  }

  // ─────────────────────────────────────────────────────
  // TOGGLE VIDEO
  // ─────────────────────────────────────────────────────
  async function toggleVideo() {
    isVideoEnabled = !isVideoEnabled;
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) videoTrack.enabled = isVideoEnabled;

    const btn = document.getElementById('toggle-video');
    if (isVideoEnabled) {
      btn.innerHTML = '<i class="fa-solid fa-video"></i>';
      btn.classList.remove('danger');
      if (isHost) setHostVideo(localStream);
    } else {
      btn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
      btn.classList.add('danger');
      if (isHost) showHostPlaceholder(userName);
    }

    socket.send(JSON.stringify({ type:'toggle_video', enabled:isVideoEnabled }));
  }

  // ─────────────────────────────────────────────────────
  // TOGGLE AUDIO
  // ─────────────────────────────────────────────────────
  function toggleAudio() {
    isAudioEnabled = !isAudioEnabled;
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) audioTrack.enabled = isAudioEnabled;

    const btn = document.getElementById('toggle-audio');
    if (isAudioEnabled) {
      btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
      btn.classList.remove('danger');
    } else {
      btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
      btn.classList.add('danger');
    }

    socket.send(JSON.stringify({ type:'toggle_audio', enabled:isAudioEnabled }));
  }

  // ─────────────────────────────────────────────────────
  // SCREEN SHARE
  // ─────────────────────────────────────────────────────
  async function toggleScreenShare() {
    if (!isScreenSharing) {
      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        const screenTrack = screenStream.getVideoTracks()[0];

        Object.values(peerConnections).forEach(pc => {
          const sender = pc.getSenders().find(s => s.track?.kind === 'video');
          if (sender) sender.replaceTrack(screenTrack);
        });

        if (isHost) {
          const hostVid = document.getElementById('host-video-element');
          hostVid.srcObject = screenStream;
        }

        screenTrack.onended = stopScreenShare;
        isScreenSharing = true;
        document.getElementById('toggle-screen').classList.add('active');
        socket.send(JSON.stringify({ type:'screen_share', enabled:true }));

      } catch (e) { console.error('Screen share error:', e); }
    } else {
      stopScreenShare();
    }
  }

  function stopScreenShare() {
    if (!screenStream) return;
    screenStream.getTracks().forEach(t => t.stop());

    const videoTrack = localStream.getVideoTracks()[0];
    Object.values(peerConnections).forEach(pc => {
      const sender = pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(videoTrack);
    });

    if (isHost) setHostVideo(localStream);

    isScreenSharing = false;
    document.getElementById('toggle-screen').classList.remove('active');
    socket.send(JSON.stringify({ type:'screen_share', enabled:false }));
  }

  // ─────────────────────────────────────────────────────
  // REMOTE STATUS
  // ─────────────────────────────────────────────────────
  function updateRemoteVideoStatus(uid, enabled) {
    // For host's big video, could show overlay — bubbles handle it implicitly
  }

  function updateRemoteMuteStatus(uid, enabled) {
    const icon = document.getElementById(`bubble-muted-${uid}`);
    if (icon) icon.style.display = enabled ? 'none' : 'flex';
  }

  // ─────────────────────────────────────────────────────
  // PARTICIPANT COUNT
  // ─────────────────────────────────────────────────────
  function updateParticipantCount() {
    const count = Object.keys(peerConnections).length + 1;
    const el = document.getElementById('participant-count');
    const prev = parseInt(el.textContent, 10);
    el.textContent = count;
    // Pop animation only when count actually changes
    if (count !== prev) {
      el.classList.remove('popping');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('popping');
      setTimeout(() => el.classList.remove('popping'), 400);
    }
  }

  // ─────────────────────────────────────────────────────
  // CHAT
  // ─────────────────────────────────────────────────────
  function addChatMessage(sender, message) {
    const list = document.getElementById('chat-messages');
    const div  = document.createElement('div');
    div.className = 'chat-message';
    div.innerHTML  = `<strong>${escapeHtml(sender)}:</strong> ${escapeHtml(message)}`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function sendChatMessage() {
    const input   = document.getElementById('chat-input');
    const message = input.value.trim();
    if (message) {
      socket.send(JSON.stringify({ type:'chat_message', message }));
      input.value = '';
    }
  }

  // ─────────────────────────────────────────────────────
  // LEAVE
  // ─────────────────────────────────────────────────────
  function leaveRoom() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (screenStream) screenStream.getTracks().forEach(t => t.stop());
    if (socket) socket.close();
    window.location.href = "{% url 'live_room_list' %}";
  }

  // ─────────────────────────────────────────────────────
  // DETECT MOBILE (for flip button)
  // ─────────────────────────────────────────────────────
  function isMobileDevice() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  // ─────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    await initLocalStream();
    initWebSocket();

    // Show flip button only for host on mobile
    if (isHost && isMobileDevice()) {
      document.getElementById('flip-camera-group').style.display = 'flex';
      document.getElementById('flip-camera').style.display = 'flex';
    }

    // Set host display name
    document.getElementById('host-display-name').textContent = userName;

    // Control listeners
    document.getElementById('toggle-video').addEventListener('click', toggleVideo);
    document.getElementById('toggle-audio').addEventListener('click', toggleAudio);
    document.getElementById('toggle-screen').addEventListener('click', toggleScreenShare);
    document.getElementById('leave-room').addEventListener('click', leaveRoom);
    document.getElementById('flip-camera').addEventListener('click', flipCamera);

    // Chat
    const toggleChatBtn = document.getElementById('toggle-chat');
    const chatSidebar   = document.getElementById('chat-sidebar');
    const closeChatBtn  = document.getElementById('close-chat');
    const sendChatBtn   = document.getElementById('send-chat');
    const chatInput     = document.getElementById('chat-input');
    const chatOverlay   = document.getElementById('chat-overlay');

    function openChat()  { chatSidebar.classList.add('open'); chatOverlay.classList.add('active'); toggleChatBtn.classList.add('hidden'); }
    function closeChat() { chatSidebar.classList.remove('open'); chatOverlay.classList.remove('active'); toggleChatBtn.classList.remove('hidden'); }

    toggleChatBtn.addEventListener('click', openChat);
    closeChatBtn.addEventListener('click', closeChat);
    chatOverlay.addEventListener('click', closeChat);
    sendChatBtn.addEventListener('click', sendChatMessage);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
  });
</script>
